<!DOCTYPE html>
<html>
<head>
    <title>Attendance Control</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h2 class="mb-4">
            ⏰ Attendance Time Control
        </h2>

        <form method="POST">

            <label class="form-label">
                Start Time
            </label>

            <input
                type="time"
                name="start_time"
                class="form-control"
                required
            >

            <br>

            <label class="form-label">
                End Time
            </label>

            <input
                type="time"
                name="end_time"
                class="form-control"
                required
            >

            <br>

            <div class="d-flex gap-2">

                <button
                    type="submit"
                    class="btn btn-primary"
                >
                    Save Timing
                </button>

                <a
                    href="/dashboard"
                    class="btn btn-dark"
                >
                    Go To Dashboard
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
