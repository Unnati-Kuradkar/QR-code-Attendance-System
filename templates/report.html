<!DOCTYPE html>
<html>
<head>
    <title>Report</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="background-color:#f4f6f9;">

<!-- Navbar -->
<nav class="navbar navbar-dark" style="background-color:#2c3e50;">
    <div class="container">
        <span class="navbar-brand fw-bold">QR Attendance</span>

        <div>
            <a href="/dashboard" class="btn btn-light btn-sm">
                Back
            </a>
        </div>
    </div>
</nav>

<!-- Main Container -->
<div class="container mt-5">

    <!-- Heading -->
    <h2 class="text-center fw-bold mb-4">
        Attendance Report
    </h2>

    <!-- Download Button -->
    <div class="d-flex justify-content-end mb-3">
        <a href="/export" class="btn btn-success">
            ⬇ Download CSV
        </a>
    </div>

    <!-- Card -->
    <div class="card shadow-lg border-0 p-3">

        <!-- Responsive Table -->
        <div class="table-responsive">

            <table class="table table-bordered table-striped table-hover align-middle">

                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Roll No</th>
                        <th>Date</th>
                        <th>Time</th>
                    </tr>
                </thead>

                <tbody>

                    {% for row in data %}
                    <tr>

                        <!-- Name -->
                        <td>{{ row[0] }}</td>

                        <!-- Roll No -->
                        <td>{{ row[1] }}</td>

                        <!-- Date -->
                        <td>{{ row[2] }}</td>

                        <!-- Time -->
                        <td>
                            {% if row[3] %}
                                {{ row[3] }}
                            {% else %}
                                -
                            {% endif %}
                        </td>

                    </tr>
                    {% endfor %}

                </tbody>

            </table>

        </div>

        <!-- Chart -->
        <div class="mt-5">
            <canvas id="attendanceChart"></canvas>
        </div>

    </div>

</div>

<!-- Chart Script -->
<script>

    let counts = {};

    {% for row in data %}

        let roll = "{{ row[1] }}";

        counts[roll] = (counts[roll] || 0) + 1;

    {% endfor %}

    let labels = Object.keys(counts);
    let values = Object.values(counts);

    new Chart(document.getElementById('attendanceChart'), {

        type: 'bar',

        data: {

            labels: labels,

            datasets: [{
                label: 'Attendance Count',
                data: values
            }]
        },

        options: {

            responsive: true,

            plugins: {
                legend: {
                    display: true
                }
            },

            scales: {
                y: {
                    beginAtZero: true
                }
            }

        }

    });

</script>

</body>
</html>
