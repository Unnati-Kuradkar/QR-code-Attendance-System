<!DOCTYPE html>
<html>
<head>
    <title>Attendance Ranking</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            margin-top: 30px;
            border-radius: 12px;
        }

        .top {
            background: #d4edda;
        }

        .low {
            background: #f8d7da;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center">Student Attendance Ranking</h2>

    <div class="card p-4 shadow">

        <table class="table table-bordered text-center">
            <thead class="table-dark">
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Roll No</th>
                    <th>Attendance %</th>
                </tr>
            </thead>

            <tbody>
                {% for s in students %}
                <tr class="{% if s.percent >= 75 %}top{% else %}low{% endif %}">
                    <td>{{ loop.index }}</td>
                    <td>{{ s.name }}</td>
                    <td>{{ s.roll }}</td>
                    <td>{{ s.percent }}%</td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
