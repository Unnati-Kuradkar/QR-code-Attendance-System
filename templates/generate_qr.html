<!DOCTYPE html>
<html>
<head>
    <title>Generate QR</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center">Generate QR Codes</h2>

    <table class="table table-bordered mt-4 text-center">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Roll No</th>
                <th>QR Code</th>
            </tr>
        </thead>

        <tbody>
            {% for s in students %}
            <tr>
                <td>{{ s[1] }}</td>
                <td>{{ s[2] }}</td>
                <td>
                    <a href="/generate_qr/{{ s[2] }}" target="_blank" class="btn btn-primary">
                        Generate QR
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

</div>

</body>
</html>
